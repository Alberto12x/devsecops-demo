name: DevSecOps Pipeline - SAST + DAST con ZAP

on:
  push:
    branches: [ main ]

jobs:
  # ================= JOB 1: COMPILACIÓN Y SAST =================
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ====== SAST-CodeQL ===========
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis (SAST)
        uses: github/codeql-action/analyze@v4

      # ======= Docker Build & Push ====================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push multi-arch image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/alberto12x/devsecops-demo:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================= JOB 2: ANÁLISIS DINÁMICO (DAST) =================
  dast:
    runs-on: ubuntu-latest
    needs: pipeline # Espera a que la imagen se haya compilado y subido a GHCR
    permissions:
      packages: read

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Levantar tu contenedor en el runner de GitHub
      - name: Run Vulnerable Web App
        run: |
          docker run -d --name webapp -p 3000:3000 ghcr.io/alberto12x/devsecops-demo:latest
          # Esperar unos segundos para asegurar que Express ha arrancado por completo
          sleep 5

      # 2. Ejecutar OWASP ZAP (Baseline Scan para buscar configuraciones y fallos web)
      - name: ZAP Scan (DAST)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000' # Apunta al puerto expuesto localmente
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          fail_action: false # Permite que el pipeline termine y genere el artefacto aunque encuentre fallos

      # 3. Empaquetar y subir los informes de ZAP como artefactos del Pipeline
      - name: Upload ZAP Report as Artifact
        if: always() # Se ejecuta aunque el escaneo falle, asegurando que siempre tengas el reporte
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            zap_report.html
