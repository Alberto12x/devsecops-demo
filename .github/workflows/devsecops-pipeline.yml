name: DevSecOps Pipeline - SAST + Docker Security (con fail en graves)

on:
  push:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ====== SAST-CodeQL ===========
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis (SAST)
        uses: github/codeql-action/analyze@v4

      # ======= Docker Multi-arch Build ====================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/alberto12x/devsecops-demo:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      # =========== Escaneo con Trivy (falla el pipeline) ====
      - name: Scan Docker image with Trivy (falla en HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/alberto12x/devsecops-demo:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL, HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'

      # ===== Push solo si todo OK ========
      - name: Push multi-arch image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/alberto12x/devsecops-demo:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
